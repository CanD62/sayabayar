kind: pipeline
type: docker
name: deploy-sayabayar

clone:
  disable: true

steps:
  - name: deploy to production
    image: appleboy/drone-ssh
    environment:
      REGISTRY_USER:
        from_secret: REGISTRY_USER
      REGISTRY_PASS:
        from_secret: REGISTRY_PASS
      ENV_PRODUCTION:
        from_secret: ENV_PRODUCTION
    settings:
      host: 192.168.50.3
      username: debian
      port: 22
      key:
        from_secret: SSH_KEY
      envs:
        - REGISTRY_USER
        - REGISTRY_PASS
        - ENV_PRODUCTION
      script: |
        PROJECT_NAME="sayabayar"
        ROOT_DIR="apps"
        APP_DIR="/home/$USER/$ROOT_DIR/$PROJECT_NAME"
        GITHUB_REPO="git@github.com:CanD62/sayabayar.git"
        NODE_IMAGE="node:20-alpine"
        PLAYWRIGHT_IMAGE="registry.pcs.my.id/playwright:latest"
        FRONTEND_IMAGE="registry.pcs.my.id/sayabayar-web"
        FRONTEND_PORT="3009"
        API_PORT="3010"
        SHORT_SHA="${DRONE_COMMIT_SHA:0:7}"

        echo "USER          : $USER"
        echo "Project       : $PROJECT_NAME"
        echo "Branch        : ${DRONE_BRANCH}"
        echo "Commit SHA    : $SHORT_SHA"
        echo "Frontend Port : $FRONTEND_PORT"
        echo "API Port      : $API_PORT"
        echo "========================================="

        mkdir -p /home/$USER/$ROOT_DIR
        cd /home/$USER/$ROOT_DIR

        echo "Menambahkan github.com ke known_hosts..."
        ssh-keyscan github.com >> ~/.ssh/known_hosts

        if [ ! -d "$PROJECT_NAME/.git" ]; then
          echo "Clone repository dari GitHub..."
          if [ -d "$PROJECT_NAME" ]; then
            chown -R $(id -u):$(id -g) "$PROJECT_NAME" 2>/dev/null || true
            rm -rf "$PROJECT_NAME"
          fi
          git clone $GITHUB_REPO
        else
          echo "Pull repository terbaru..."
          cd $PROJECT_NAME
          git fetch --all
          git reset --hard origin/main
        fi

        cd $APP_DIR

        echo "Menulis .env dari secret Drone..."
        echo "$ENV_PRODUCTION" > .env
        chmod 600 .env
        grep -v '^#' .env | grep -v '^[[:space:]]*$' > .env.docker
        chmod 600 .env.docker
        echo "File .env berhasil ditulis"

        DATABASE_URL=$(grep "^DATABASE_URL=" .env | cut -d'=' -f2-)
        NEXT_PUBLIC_API_URL=$(grep "^API_URL=" .env | cut -d'=' -f2-)
        CF_SITE_KEY=$(grep "^NEXT_PUBLIC_CF_TURNSTILE_SITE_KEY=" .env | cut -d'=' -f2-)

        echo "Install dependencies via pnpm workspace..."
        docker run --rm \
          -v $(pwd):/app \
          -w /app \
          $NODE_IMAGE \
          sh -c "npm install -g pnpm --quiet && pnpm config set store-dir /app/.pnpm-store && pnpm install --frozen-lockfile"

        echo "Prisma generate untuk Alpine dan Ubuntu..."
        docker run --rm \
          -v $(pwd):/app \
          -w /app/packages/shared \
          -e DATABASE_URL="$DATABASE_URL" \
          $NODE_IMAGE \
          sh -c "node_modules/.bin/prisma generate"

        echo "Prisma db push..."
        docker run --rm \
          -v $(pwd):/app \
          -w /app/packages/shared \
          -e DATABASE_URL="$DATABASE_URL" \
          $NODE_IMAGE \
          sh -c "node_modules/.bin/prisma db push --skip-generate"

        echo "Login ke Docker registry..."
        echo $REGISTRY_PASS | docker login registry.pcs.my.id -u $REGISTRY_USER --password-stdin

        echo "Pull Playwright base image..."
        docker pull $PLAYWRIGHT_IMAGE

        echo "Deploy API Fastify..."
        docker stop sayabayar_api || true
        docker rm sayabayar_api || true
        docker run -d --name sayabayar_api \
          -v $APP_DIR:/app \
          -w /app/apps/api \
          -p $API_PORT:$API_PORT \
          -e TZ=Asia/Jakarta \
          --env-file $APP_DIR/.env.docker \
          --restart always \
          $NODE_IMAGE \
          node src/index.js
        echo "API berjalan di port $API_PORT"

        echo "Deploy Scraper Playwright..."
        docker stop sayabayar_scraper || true
        docker rm sayabayar_scraper || true
        docker run -d --name sayabayar_scraper \
          -v $APP_DIR:/app \
          -w /app/apps/scraper \
          -e TZ=Asia/Jakarta \
          --env-file $APP_DIR/.env.docker \
          --restart always \
          $PLAYWRIGHT_IMAGE \
          node src/index.js
        echo "Scraper berjalan"

        echo "Build Frontend image Next.js..."
        echo "NEXT_PUBLIC_API_URL : $NEXT_PUBLIC_API_URL"
        echo "CF_SITE_KEY         : $CF_SITE_KEY"
        docker build \
          -f apps/frontend/Dockerfile \
          --build-arg "NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL" \
          --build-arg "NEXT_PUBLIC_CF_TURNSTILE_SITE_KEY=$CF_SITE_KEY" \
          -t $FRONTEND_IMAGE:latest \
          -t $FRONTEND_IMAGE:$SHORT_SHA \
          apps/frontend

        echo "Push frontend image ke registry..."
        docker push $FRONTEND_IMAGE:latest
        docker push $FRONTEND_IMAGE:$SHORT_SHA

        echo "Deploy Frontend container..."
        docker stop sayabayar_web || true
        docker rm sayabayar_web || true
        docker run -d --name sayabayar_web \
          -p $FRONTEND_PORT:3000 \
          -e TZ=Asia/Jakarta \
          -e NODE_ENV=production \
          --restart always \
          $FRONTEND_IMAGE:latest
        echo "Frontend berjalan di port $FRONTEND_PORT"

        echo "Menunggu semua services ready..."
        sleep 15

        echo "Status containers:"
        docker ps --filter "name=sayabayar" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

        echo "Logs API tail 20:"
        docker logs --tail 20 sayabayar_api

        echo "Logs Scraper tail 10:"
        docker logs --tail 10 sayabayar_scraper

        echo "Logs Frontend tail 10:"
        docker logs --tail 10 sayabayar_web

        echo "Deployment selesai!"
        echo "Frontend : http://192.168.50.3:$FRONTEND_PORT"
        echo "API      : http://192.168.50.3:$API_PORT"

trigger:
  branch:
    - main
  event:
    - push
